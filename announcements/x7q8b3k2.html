<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子發票手機條碼載具</title>
    <link rel="stylesheet" href="../css/style.css">
    <!-- 引入條碼字體與現代英文字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .barcode-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.08) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            max-width: 480px;
            margin: 2rem auto;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .barcode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00f2ff, #7000ff);
        }
        .barcode-card:hover {
            transform: translateY(-8px);
            border-color: #00f2ff;
            box-shadow: 0 30px 60px rgba(0, 242, 255, 0.15);
        }
        .barcode-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }
        .barcode-subtitle {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        .barcode-display-wrapper {
            background: #ffffff;
            padding: 2.5rem 1.5rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .barcode-display-wrapper::after {
            content: 'SCAN ME';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Outfit', sans-serif;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            color: rgba(0, 0, 0, 0.3);
        }
        .barcode-visual {
            font-family: 'Libre Barcode 39', cursive;
            font-size: 80px;
            line-height: 1;
            color: #000000;
            letter-spacing: 0;
            margin: 0 auto 1rem;
            user-select: none;
            /* 輕微拉伸以提高部分舊款掃描器的識別率 */
            transform: scaleY(1.1);
        }
        .barcode-text-code {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #111111;
            letter-spacing: 0.08em;
            margin: 0;
        }
        .copy-btn {
            background: linear-gradient(90deg, #00f2ff, #7000ff);
            border: none;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(112, 0, 255, 0.4);
        }
        .copy-btn:active {
            transform: scale(0.98);
        }
        .info-list {
            text-align: left;
            max-width: 480px;
            margin: 2rem auto 0;
            padding: 0 1rem;
        }
        .info-item {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
        }
        .info-item-icon {
            color: #00f2ff;
            margin-top: 0.2rem;
            flex-shrink: 0;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 242, 255, 0.9);
            color: #0a0a0c;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>手機條碼載具</h1>
            <p style="opacity: 0.5;">更新日期：2026-06-06</p>
            <div class="qr-container" style="margin-top: 1.5rem;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://toydogcat.github.io/public-announcement/announcements/x7q8b3k2.html" alt="QR Code" style="background: white; padding: 8px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <p style="font-size: 0.7rem; opacity: 0.3; margin-top: 0.5rem;">掃描分享此載具頁面</p>
            </div>
        </header>
        
        <nav>
            <a href="../index.html">首頁</a>
            <a href="../search.html">搜尋公告</a>
        </nav>

        <div class="barcode-card">
            <div class="barcode-title">電子發票載具</div>
            <div class="barcode-subtitle">雲端發票・綠色消費</div>
            
            <div class="barcode-display-wrapper">
                <!-- Code 39 格式需要在首尾加上 * -->
                <div class="barcode-visual">*/PSI0JP2*</div>
                <div class="barcode-text-code">/PSI0JP2</div>
            </div>
            
            <button class="copy-btn" onclick="copyCarrier()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                複製載具代碼
            </button>
        </div>

        <div class="info-list">
            <div class="info-item">
                <span class="info-item-icon">⚡</span>
                <span><strong>結帳即刷：</strong> 結帳時直接向店員出示此條碼，即可將電子發票儲存至雲端。</span>
            </div>
            <div class="info-item">
                <span class="info-item-icon">🌱</span>
                <span><strong>環保省時：</strong> 減少紙本發票與明細列印，響應節能減碳，中獎自動通知並匯入帳戶。</span>
            </div>
            <div class="info-item">
                <span class="info-item-icon">💡</span>
                <span><strong>關於條碼：</strong> 本頁面採用 Google 向量條碼字型渲染，取代高容量點陣圖片，可大幅縮減網路傳輸耗能與空間，並支援高解析度無限放大掃描。</span>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">載具代碼已複製到剪貼簿！</div>

    <script>
        function copyCarrier() {
            navigator.clipboard.writeText('/PSI0JP2').then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }).catch(err => {
                console.error('無法複製代碼: ', err);
            });
        }
    </script>
</body>
</html>
